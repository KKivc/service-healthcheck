name: Docker Build

on: [push, pull_request]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pip install -r requirements.txt
      - run: pytest test_healthcheck.py
      - run: docker build -t ghcr.io/kkivc/service-healthcheck:latest .
      - run: docker login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}
      - run: docker push ghcr.io/kkivc/service-healthcheck:latest
      - name: 部署到服务器
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            docker pull ghcr.io/kkivc/service-healthcheck:latest
            docker rm -f healthcheck
            docker run -d --name healthcheck ghcr.io/kkivc/service-healthcheck:latest
            